name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-southeast-3' }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY || 'opsledgerappimg' }}
  HELM_REPO_NAME: gitopsledger-helm
  HELM_VALUES_FILE: helm/opsledger/values.yaml

jobs:
  build-and-sonar:
    name: Maven, Checkstyle, and SonarQube
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout application repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: |
            ${{ runner.os }}-sonar

      - name: Maven build and unit tests
        run: mvn -B clean verify

      - name: Checkstyle
        run: >
          mvn -B
          org.apache.maven.plugins:maven-checkstyle-plugin:3.6.0:checkstyle
          -Dcheckstyle.output.file=target/checkstyle-result.xml
          -Dcheckstyle.output.format=xml

      - name: SonarQube scan
        uses: sonarsource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

      - name: SonarQube quality gate
        uses: sonarsource/sonarqube-quality-gate-action@v1.1.0
        timeout-minutes: 10
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

  docker-build-push:
    name: Build and Push Docker Image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      ecr_registry: ${{ steps.login-ecr.outputs.registry }}
      image_tag: ${{ steps.image-meta.outputs.image_tag }}

    steps:
      - name: Checkout application repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: image-meta
        run: echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.image-meta.outputs.image_tag }}
        run: |
          docker build \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:latest" \
            .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"

  update-helm:
    name: Update Helm Values
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs:
      - docker-build-push

    steps:
      - name: Checkout Helm repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/${{ env.HELM_REPO_NAME }}
          token: ${{ secrets.GITOPS_PAT }}
          path: helm-repo

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Update image fields in Helm values
        working-directory: helm-repo
        env:
          IMAGE_URI: ${{ needs.docker-build-push.outputs.ecr_registry }}/${{ env.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ needs.docker-build-push.outputs.image_tag }}
        run: |
          yq -i '.app.image = strenv(IMAGE_URI) | .app.tag = strenv(IMAGE_TAG)' "$HELM_VALUES_FILE"
          yq '.app.image, .app.tag' "$HELM_VALUES_FILE"

      - name: Commit and push Helm values update
        working-directory: helm-repo
        env:
          IMAGE_TAG: ${{ needs.docker-build-push.outputs.image_tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$HELM_VALUES_FILE"

          if git diff --cached --quiet; then
            echo "No Helm values changes to commit."
          else
            git commit -m "Update OpsLedger image to $IMAGE_TAG"
            git push
          fi
